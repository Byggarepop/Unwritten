name: Release

# On a version tag (e.g. v0.1.0): build + test, pack with the tag's version, publish to NuGet,
# create a GitHub Release, then publish the server listing to the Official MCP Registry.
#
# NuGet publishing uses Trusted Publishing (OIDC) — no stored API key. nuget.org issues a
# short-lived key to this workflow at run time. It is OFF by default; to enable it:
#   1. nuget.org -> (your username) -> Trusted Publishing -> add a policy:
#        Repository Owner: Byggarepop   Repository: ConventionSense
#        Workflow File: release.yml     Environment: release   (must match the job's environment below)
#   2. add the repo secret   NUGET_USER    = your nuget.org username (profile name, NOT your email)
#   3. set the repo variable PUBLISH_NUGET = true   (Settings -> Secrets and variables -> Actions)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # The OIDC token carries this environment as a claim, so the nuget.org trusted-publishing policy
    # can restrict publishing to it. GitHub auto-creates the environment; optionally add protection
    # rules (e.g. a required reviewer) to gate releases. Keep this name in sync with the policy.
    environment: release
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # request the OIDC token for NuGet trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and test
        run: dotnet test ConventionSense.slnx -c Release

      - name: Pack
        run: dotnet pack src/ConventionSense/ConventionSense.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }} --output ./artifacts

      # NuGet publishing is OFF unless you opt in (see header): both steps below run only when
      # PUBLISH_NUGET == 'true'. Trusted Publishing — login exchanges the OIDC token for a
      # short-lived key, requested just before the push (the key is valid ~1 hour).
      - name: NuGet login (OIDC -> temp API key)
        if: vars.PUBLISH_NUGET == 'true'
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        if: vars.PUBLISH_NUGET == 'true'
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.NOTES }}
          files: ./artifacts/*.nupkg

  # Publish the server listing to the Official MCP Registry (registry.modelcontextprotocol.io),
  # which downstream registries (e.g. the GitHub MCP Registry) consume. The registry verifies that
  # the NuGet package's packed README carries the `mcp-name: io.github.Byggarepop/conventionsense`
  # marker, so this MUST run AFTER the package is live on nuget.org — hence `needs: publish` plus
  # the README availability poll below. Auth is GitHub OIDC (no stored secret): the workflow's OIDC
  # token proves it runs in Byggarepop/* and unlocks the io.github.Byggarepop/* namespace.
  #
  # OFF by default. To enable: set the repo variable PUBLISH_MCP_REGISTRY = true. It also needs the
  # package on nuget.org — either pushed in this same run (PUBLISH_NUGET = true) or already public.
  mcp-registry:
    name: mcp-registry
    needs: publish
    if: vars.PUBLISH_MCP_REGISTRY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # request the OIDC token for github-oidc registry auth
    steps:
      - uses: actions/checkout@v4

      - name: Version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # Stamp the tag's version into the committed server.json so the listing version can never
      # drift from the release tag (the registry rejects a version that isn't on nuget.org).
      - name: Sync server.json version to tag
        run: |
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' .mcp/server.json > server.tmp
          mv server.tmp .mcp/server.json
          cat .mcp/server.json

      # The registry pulls the package README to verify the mcp-name marker; wait until nuget.org
      # has finished validating and the README endpoint is live before publishing.
      - name: Wait for NuGet README to be available
        run: |
          id="conventionsense"; version="$(echo "$VERSION" | tr '[:upper:]' '[:lower:]')"
          url="https://api.nuget.org/v3-flatcontainer/$id/$version/readme"
          for i in $(seq 1 30); do
            if curl -sfL "$url" >/dev/null; then echo "README available after ~$((i*10))s"; exit 0; fi
            echo "Not yet available ($((i*10))s elapsed)…"; sleep 10
          done
          echo "::error::Package README for $id $version not available after 300s ($url)"; exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to the MCP Registry
        run: ./mcp-publisher publish .mcp/server.json
